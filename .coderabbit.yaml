# CodeRabbit Configuration — Clemens Team Chat
# React + Capacitor (mobile hybrid app)

language: en-US
tone_instructions: Be direct and concise. Mobile-first is mandatory for this app.

early_access: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "src/**"
      instructions: >
        This is a mobile-first app (Capacitor). All components must work at 375px.
        Touch targets minimum 44px. No hover-only interactions.
        No raw fetch() — use the API client.
  tools:
    enabled: true
    eslint:
      enabled: true

chat:
  auto_reply: true
